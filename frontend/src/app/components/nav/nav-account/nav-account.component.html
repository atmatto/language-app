@let u = user();
@if (u === null) {
    <a routerLink="/signin" draggable="false">Sign in</a>
} @else {
    @if (u === undefined) {
        <app-skeleton-placeholder>Loading the user</app-skeleton-placeholder>
    } @else {
        @if (u.contentAdministrator || u.userAdministrator) {
            <a routerLink="/admin" draggable="false">Administration</a>
        }
        <a routerLink="/user/{{u.id}}" class="username" draggable="false">{{u.username}}</a>
    }
    <a routerLink="/signout" draggable="false">Sign out</a>
}
