@let w = word();
@if (w === undefined) {
    <app-skeleton-placeholder>Loading</app-skeleton-placeholder>
} @else {
    <div>
        <app-language-simple [showName]="false" [languageId]="w.language" />
        {{w.text}}
    </div>
    @if (w.base !== null) {
        <div class="base">← <app-word-simple [wordId]="w.base"/></div>
    }
}
